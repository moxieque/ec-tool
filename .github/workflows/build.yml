name: Build Executable

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask flask-cors playwright pillow pyinstaller
          python -m playwright install chromium

      - name: Build EXE (Windows)
        run: |
          pyinstaller --onefile `
            --windowed `
            --name "ec-tool" `
            --icon "static/images/icon.ico" 2>$null; `
            pyinstaller --onefile `
            --windowed `
            --name "ec-tool" `
            --add-data "static:static" `
            --add-data "data:data" `
            --add-data "manual:manual" `
            --hidden-import=werkzeug `
            --hidden-import=flask `
            app.py || `
            pyinstaller --onefile `
            --windowed `
            --name "ec-tool" `
            --add-data "static;static" `
            --add-data "data;data" `
            --add-data "manual;manual" `
            --hidden-import=werkzeug `
            --hidden-import=flask `
            app.py

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: ec-tool-windows
          path: dist/ec-tool.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask flask-cors playwright pillow pyinstaller
          python -m playwright install chromium

      - name: Build APP (macOS)
        run: |
          pyinstaller --onefile \
            --windowed \
            --name "ec-tool" \
            --add-data "static:static" \
            --add-data "data:data" \
            --add-data "manual:manual" \
            --hidden-import=werkzeug \
            --hidden-import=flask \
            app.py

      - name: Create DMG (macOS)
        run: |
          mkdir -p dist/dmg
          cp -r dist/ec-tool.app dist/dmg/
          hdiutil create -volname "ec-tool" -srcfolder dist/dmg -ov -format UDZO dist/ec-tool.dmg

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: ec-tool-macos
          path: dist/ec-tool.dmg

  create-release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v3

      - name: Download Windows EXE
        uses: actions/download-artifact@v4
        with:
          name: ec-tool-windows
          path: artifacts/

      - name: Download macOS DMG
        uses: actions/download-artifact@v4
        with:
          name: ec-tool-macos
          path: artifacts/

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "artifacts/ec-tool.exe,artifacts/ec-tool.dmg"
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
