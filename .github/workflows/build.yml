name: Build Executable

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask flask-cors playwright pillow pyinstaller
          python -m playwright install chromium

      - name: Build EXE (Windows)
        run: |
          pyinstaller --onefile `
            --windowed `
            --name "Zaikore" `
            --add-data "static;static" `
            --add-data "data;data" `
            --add-data "manual;manual" `
            --hidden-import=werkzeug `
            --hidden-import=flask `
            app.py

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: Zaikore-windows
          path: dist/Zaikore.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask flask-cors playwright pillow pyinstaller
          python -m playwright install chromium

      - name: Build APP (macOS)
        run: |
          pyinstaller --windowed \
            --name "Zaikore" \
            --add-data "static:static" \
            --add-data "data:data" \
            --add-data "manual:manual" \
            --hidden-import=werkzeug \
            --hidden-import=flask \
            app.py

      - name: Create DMG (macOS)
        run: |
          mkdir -p dist/dmg
          cp -r dist/Zaikore.app dist/dmg/
          hdiutil create -volname "Zaikore" -srcfolder dist/dmg -ov -format UDZO dist/Zaikore.dmg

      - name: Create PKG Installer (macOS)
        run: |
          # installer-scripts に実行権限を付与
          chmod 755 installer-scripts/preinstall
          chmod 755 installer-scripts/postinstall

          # PKG を生成（/Applications に自動インストール）
          pkgbuild \
            --root dist/Zaikore.app \
            --install-location /Applications/Zaikore.app \
            --scripts installer-scripts \
            --identifier com.moxieque.zaikore \
            --version "${{ github.ref_name }}" \
            dist/Zaikore-installer.pkg

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: Zaikore-macos
          path: dist/Zaikore.dmg

      - name: Upload macOS PKG
        uses: actions/upload-artifact@v4
        with:
          name: Zaikore-macos-pkg
          path: dist/Zaikore-installer.pkg

  create-release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows EXE
        uses: actions/download-artifact@v4
        with:
          name: Zaikore-windows
          path: artifacts/

      - name: Download macOS DMG
        uses: actions/download-artifact@v4
        with:
          name: Zaikore-macos
          path: artifacts/

      - name: Download macOS PKG
        uses: actions/download-artifact@v4
        with:
          name: Zaikore-macos-pkg
          path: artifacts/

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "artifacts/Zaikore.exe,artifacts/Zaikore.dmg,artifacts/Zaikore-installer.pkg"
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
